scripts:
  - script_id: knowledge.prime
    description: "Prime knowledge context from repository analysis"
    runtime: python
    path: scripts/knowledge/prime_knowledge.py
    timeout_ms: 300000
    retryable: true
    side_effects: read-only
    required_env:
      - ANTHROPIC_API_KEY
    orchestrator_notes: "Run early in a workflow to establish codebase context for downstream agents"
    rerun_policy: restart

  - script_id: implementation.batch_bridge
    description: "Translate Bees planning artifacts into Memory Bank task packs"
    runtime: python
    path: scripts/implementation/bees_batch_bridge.py
    timeout_ms: 120000
    retryable: false
    side_effects: workspace-write
    required_env: []
    orchestrator_notes: "Run after planning stage to generate task packs for external implementation pipeline"
    rerun_policy: refuse

  - script_id: monitoring.check_health
    description: "Run health checks against target systems"
    runtime: shell
    path: scripts/monitoring/check_health.sh
    timeout_ms: 60000
    retryable: true
    side_effects: read-only
    required_env: []
    orchestrator_notes: "Run in collect_data stage to gather health status"
    rerun_policy: restart

  - script_id: monitoring.aggregate_metrics
    description: "Aggregate monitoring metrics from collected data"
    runtime: shell
    path: scripts/monitoring/aggregate_metrics.sh
    timeout_ms: 60000
    retryable: true
    side_effects: read-only
    required_env: []
    orchestrator_notes: "Run in collect_data stage after health check to compile metrics"
    rerun_policy: restart

  - script_id: delivery.stage_explicit
    description: "Stage specific files in the workspace"
    runtime: internal
    path: src/delivery/stage-explicit.ts
    timeout_ms: 60000
    retryable: false
    side_effects: workspace-write
    required_env: []
    orchestrator_notes: "Run in commit_and_pr stage to stage files before committing"
    rerun_policy: restart

  - script_id: delivery.commit_with_trailers
    description: "Create a conventional commit with identity trailers"
    runtime: internal
    path: src/delivery/commit-with-trailers.ts
    timeout_ms: 60000
    retryable: false
    side_effects: workspace-write
    required_env: []
    orchestrator_notes: "Run in commit_and_pr stage after staging to create the commit"
    rerun_policy: refuse

  - script_id: delivery.push_branch
    description: "Push a branch to a remote repository"
    runtime: internal
    path: src/delivery/push-branch.ts
    timeout_ms: 60000
    retryable: true
    side_effects: external-write
    required_env:
      - GITHUB_TOKEN
    orchestrator_notes: "Run in commit_and_pr stage after commit to push the branch"
    rerun_policy: restart

  - script_id: delivery.upsert_draft_pr
    description: "Create or update a GitHub draft pull request"
    runtime: internal
    path: src/delivery/upsert-draft-pr.ts
    timeout_ms: 60000
    retryable: true
    side_effects: external-write
    required_env:
      - GITHUB_TOKEN
    orchestrator_notes: "Run in commit_and_pr stage after push to create or update the PR"
    rerun_policy: restart
